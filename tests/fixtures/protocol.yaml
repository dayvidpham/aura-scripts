# Combinatorial Test Fixture for Aura Protocol
# =============================================
#
# This fixture defines reusable components that can be combined to generate
# comprehensive test cases for the aura_protocol state machine and related types.
# Instead of manually listing hundreds of test paths, we define:
#
# 1. phase_specs: Canonical PhaseSpec entries (phase_id, domain, owner_roles, transitions)
# 2. epoch_states: Pre-built epoch states at various lifecycle positions
# 3. vote_combinations: Review vote combinations for consensus testing
# 4. audit_events: Sample AuditEvent objects for record/query test data
#
# Test generators combine these components to produce parametrized test cases.

# ─── Phase Specifications ─────────────────────────────────────────────────────
# Each entry mirrors PHASE_SPECS from aura_protocol/types.py.
# These are used to validate that the live PHASE_SPECS dict matches expectations,
# and to generate transition test cases by crossing phase_specs × transitions.

phase_specs:
  p1_request:
    phase_id: p1
    name: Request
    number: 1
    domain: user
    owner_roles:
      - epoch
      - architect
    transitions:
      - target: p2
        condition: "classification confirmed, research and explore complete"

  p2_elicit:
    phase_id: p2
    name: Elicit
    number: 2
    domain: user
    owner_roles:
      - epoch
      - architect
    transitions:
      - target: p3
        condition: "URD created with structured requirements"

  p3_propose:
    phase_id: p3
    name: Propose
    number: 3
    domain: plan
    owner_roles:
      - epoch
      - architect
    transitions:
      - target: p4
        condition: "proposal created"

  p4_review:
    phase_id: p4
    name: Review
    number: 4
    domain: plan
    owner_roles:
      - epoch
      - architect
      - reviewer
    transitions:
      - target: p5
        condition: "all 3 reviewers vote ACCEPT"
      - target: p3
        condition: "any reviewer votes REVISE"
        action: "create PROPOSAL-{N+1}, mark current aura:superseded"

  p5_uat:
    phase_id: p5
    name: Plan UAT
    number: 5
    domain: user
    owner_roles:
      - epoch
      - architect
    transitions:
      - target: p6
        condition: "user accepts plan"
      - target: p3
        condition: "user requests changes"
        action: "create PROPOSAL-{N+1}"

  p6_ratify:
    phase_id: p6
    name: Ratify
    number: 6
    domain: plan
    owner_roles:
      - epoch
      - architect
    transitions:
      - target: p7
        condition: "proposal ratified, IMPL_PLAN placeholder created"

  p7_handoff:
    phase_id: p7
    name: Handoff
    number: 7
    domain: plan
    owner_roles:
      - epoch
      - architect
      - supervisor
    transitions:
      - target: p8
        condition: "handoff document stored at .git/.aura/handoff/"

  p8_impl_plan:
    phase_id: p8
    name: Impl Plan
    number: 8
    domain: impl
    owner_roles:
      - epoch
      - supervisor
    transitions:
      - target: p9
        condition: "all slices created with leaf tasks, assigned, and dependency-chained"

  p9_slice:
    phase_id: p9
    name: Worker Slices
    number: 9
    domain: impl
    owner_roles:
      - epoch
      - supervisor
      - worker
    transitions:
      - target: p10
        condition: "all slices complete, quality gates pass"

  p10_code_review:
    phase_id: p10
    name: Code Review
    number: 10
    domain: impl
    owner_roles:
      - epoch
      - supervisor
      - reviewer
    transitions:
      - target: p11
        condition: "all 3 reviewers ACCEPT, all BLOCKERs resolved"
      - target: p9
        condition: "any reviewer votes REVISE"
        action: "fix BLOCKERs in affected slices, then re-review"

  p11_impl_uat:
    phase_id: p11
    name: Impl UAT
    number: 11
    domain: user
    owner_roles:
      - epoch
      - supervisor
    transitions:
      - target: p12
        condition: "user accepts implementation"
      - target: p9
        condition: "user requests changes"
        action: "create fix tasks in affected slices"

  p12_landing:
    phase_id: p12
    name: Landing
    number: 12
    domain: impl
    owner_roles:
      - epoch
      - supervisor
    transitions:
      - target: complete
        condition: "git push succeeds, all tasks closed or dependency-resolved"


# ─── Epoch States ─────────────────────────────────────────────────────────────
# Pre-built epoch state snapshots for use in parametrized tests.
# These represent common positions in the lifecycle that tests often need.

epoch_states:
  fresh:
    description: "Brand-new epoch at P1, no history"
    current_phase: p1
    completed_phases: []
    review_votes: {}
    blocker_count: 0
    epoch_id: test-epoch-fresh

  at_p2:
    description: "Epoch that has completed P1 and is now at P2"
    current_phase: p2
    completed_phases:
      - p1
    review_votes: {}
    blocker_count: 0
    epoch_id: test-epoch-p2

  at_p3:
    description: "Epoch at P3 (Propose)"
    current_phase: p3
    completed_phases:
      - p1
      - p2
    review_votes: {}
    blocker_count: 0
    epoch_id: test-epoch-p3

  at_p4_reviewing:
    description: "Epoch at P4 (Review), no votes yet"
    current_phase: p4
    completed_phases:
      - p1
      - p2
      - p3
    review_votes: {}
    blocker_count: 0
    epoch_id: test-epoch-p4

  at_p4_partial_accept:
    description: "Epoch at P4 with one ACCEPT vote (not yet consensus)"
    current_phase: p4
    completed_phases:
      - p1
      - p2
      - p3
    review_votes:
      correctness: ACCEPT
    blocker_count: 0
    epoch_id: test-epoch-p4-partial

  at_p4_two_accepts:
    description: "Epoch at P4 with two ACCEPT votes (still not consensus)"
    current_phase: p4
    completed_phases:
      - p1
      - p2
      - p3
    review_votes:
      correctness: ACCEPT
      test_quality: ACCEPT
    blocker_count: 0
    epoch_id: test-epoch-p4-two-accepts

  at_p4_all_accept:
    description: "Epoch at P4 with full consensus (all 3 ACCEPT)"
    current_phase: p4
    completed_phases:
      - p1
      - p2
      - p3
    review_votes:
      correctness: ACCEPT
      test_quality: ACCEPT
      elegance: ACCEPT
    blocker_count: 0
    epoch_id: test-epoch-p4-consensus

  at_p4_revise:
    description: "Epoch at P4 with a REVISE vote (drives back to P3)"
    current_phase: p4
    completed_phases:
      - p1
      - p2
      - p3
    review_votes:
      correctness: ACCEPT
      test_quality: REVISE
      elegance: ACCEPT
    blocker_count: 0
    epoch_id: test-epoch-p4-revise

  at_p10_reviewing:
    description: "Epoch at P10 (Code Review), no votes yet"
    current_phase: p10
    completed_phases:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
      - p8
      - p9
    review_votes: {}
    blocker_count: 0
    epoch_id: test-epoch-p10

  at_p10_with_blocker:
    description: "Epoch at P10 with a blocker (blocks advance to P11)"
    current_phase: p10
    completed_phases:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
      - p8
      - p9
    review_votes:
      correctness: ACCEPT
      test_quality: ACCEPT
      elegance: ACCEPT
    blocker_count: 1
    epoch_id: test-epoch-p10-blocker

  at_p10_all_accept:
    description: "Epoch at P10 with full consensus, no blockers (can advance to P11)"
    current_phase: p10
    completed_phases:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
      - p8
      - p9
    review_votes:
      correctness: ACCEPT
      test_quality: ACCEPT
      elegance: ACCEPT
    blocker_count: 0
    epoch_id: test-epoch-p10-all-accept

  at_p10_revise:
    description: "Epoch at P10 with a REVISE vote (drives back to P9)"
    current_phase: p10
    completed_phases:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
      - p8
      - p9
    review_votes:
      correctness: ACCEPT
      test_quality: REVISE
      elegance: ACCEPT
    blocker_count: 0
    epoch_id: test-epoch-p10-revise

  at_p12:
    description: "Epoch at P12 (Landing), almost complete"
    current_phase: p12
    completed_phases:
      - p1
      - p2
      - p3
      - p4
      - p5
      - p6
      - p7
      - p8
      - p9
      - p10
      - p11
    review_votes: {}
    blocker_count: 0
    epoch_id: test-epoch-p12


# ─── Vote Combinations ────────────────────────────────────────────────────────
# Combinations of review votes for the 3 axes: correctness, test_quality, elegance.
# Used to parametrize consensus gate and revise-back tests.

vote_combinations:
  all_accept:
    description: "All three axes vote ACCEPT (consensus reached)"
    votes:
      correctness: ACCEPT
      test_quality: ACCEPT
      elegance: ACCEPT
    has_consensus: true
    has_revise: false

  all_revise:
    description: "All three axes vote REVISE (no consensus)"
    votes:
      correctness: REVISE
      test_quality: REVISE
      elegance: REVISE
    has_consensus: false
    has_revise: true

  mixed_one_revise_correctness:
    description: "Correctness is REVISE, others ACCEPT"
    votes:
      correctness: REVISE
      test_quality: ACCEPT
      elegance: ACCEPT
    has_consensus: false
    has_revise: true

  mixed_one_revise_test_quality:
    description: "Test quality is REVISE, others ACCEPT"
    votes:
      correctness: ACCEPT
      test_quality: REVISE
      elegance: ACCEPT
    has_consensus: false
    has_revise: true

  mixed_one_revise_elegance:
    description: "Elegance is REVISE, others ACCEPT"
    votes:
      correctness: ACCEPT
      test_quality: ACCEPT
      elegance: REVISE
    has_consensus: false
    has_revise: true

  partial_one_axis:
    description: "Only one axis voted (correctness ACCEPT, others absent)"
    votes:
      correctness: ACCEPT
    has_consensus: false
    has_revise: false

  partial_two_axes:
    description: "Two axes voted ACCEPT (test_quality absent)"
    votes:
      correctness: ACCEPT
      elegance: ACCEPT
    has_consensus: false
    has_revise: false

  empty:
    description: "No votes cast yet"
    votes: {}
    has_consensus: false
    has_revise: false


# ─── Audit Events ─────────────────────────────────────────────────────────────
# Sample AuditEvent objects used to test recording and querying of audit trails.
# Each entry maps to an AuditEvent(epoch_id, event_type, phase, role, payload).

audit_events:
  phase_advance_p1_to_p2:
    description: "Phase advance from P1 to P2"
    epoch_id: test-epoch-audit-001
    event_type: phase_advance
    phase: p1
    role: architect
    payload:
      from_phase: p1
      to_phase: p2
      triggered_by: architect
      condition_met: "classification confirmed, research and explore complete"

  phase_advance_p3_to_p4:
    description: "Phase advance from P3 to P4"
    epoch_id: test-epoch-audit-001
    event_type: phase_advance
    phase: p3
    role: architect
    payload:
      from_phase: p3
      to_phase: p4
      triggered_by: architect
      condition_met: "proposal created"

  vote_recorded_accept:
    description: "Reviewer votes ACCEPT on correctness"
    epoch_id: test-epoch-audit-001
    event_type: vote_recorded
    phase: p4
    role: reviewer
    payload:
      axis: correctness
      vote: ACCEPT
      reviewer_id: reviewer-1

  vote_recorded_revise:
    description: "Reviewer votes REVISE on test_quality"
    epoch_id: test-epoch-audit-001
    event_type: vote_recorded
    phase: p10
    role: reviewer
    payload:
      axis: test_quality
      vote: REVISE
      reviewer_id: reviewer-2

  blocker_recorded:
    description: "Blocker finding recorded in code review"
    epoch_id: test-epoch-audit-002
    event_type: blocker_recorded
    phase: p10
    role: reviewer
    payload:
      severity: BLOCKER
      finding: "Critical bug in state machine transition guard"
      slice_id: aura-plugins-0001

  blocker_resolved:
    description: "Blocker cleared after fix"
    epoch_id: test-epoch-audit-002
    event_type: blocker_resolved
    phase: p10
    role: supervisor
    payload:
      severity: BLOCKER
      slice_id: aura-plugins-0001
      resolution: "Fixed guard condition in advance()"

  constraint_check_passed:
    description: "Constraint check that passed"
    epoch_id: test-epoch-audit-003
    event_type: constraint_check
    phase: p4
    role: epoch
    payload:
      constraint_id: C-review-consensus
      passed: true
      message: null

  constraint_check_failed:
    description: "Constraint check that failed"
    epoch_id: test-epoch-audit-003
    event_type: constraint_check
    phase: p4
    role: epoch
    payload:
      constraint_id: C-review-consensus
      passed: false
      message: "Missing vote on axis: elegance"


# ─── Phase Forward Path ───────────────────────────────────────────────────────
# The single linear happy path through all phases (no revisions).
# Used to generate sequential transition test cases.

forward_phase_path:
  - p1
  - p2
  - p3
  - p4
  - p5
  - p6
  - p7
  - p8
  - p9
  - p10
  - p11
  - p12
  - complete


# ─── Transition Test Matrix ───────────────────────────────────────────────────
# Predefined expected behaviors for key transitions.
# format: source → target, with expected result and reason.

transition_matrix:
  # Valid forward transitions
  valid_forward:
    - source: p1
      target: p2
      expected_success: true
      requires_consensus: false
      requires_blocker_clear: false
      description: "P1 → P2: Basic forward transition"

    - source: p2
      target: p3
      expected_success: true
      requires_consensus: false
      requires_blocker_clear: false
      description: "P2 → P3: Basic forward transition"

    - source: p3
      target: p4
      expected_success: true
      requires_consensus: false
      requires_blocker_clear: false
      description: "P3 → P4: Forward to review phase"

    - source: p4
      target: p5
      expected_success: true
      requires_consensus: true
      requires_blocker_clear: false
      description: "P4 → P5: Requires all-ACCEPT consensus"

    - source: p10
      target: p11
      expected_success: true
      requires_consensus: true
      requires_blocker_clear: true
      description: "P10 → P11: Requires consensus AND blocker-free"

    - source: p12
      target: complete
      expected_success: true
      requires_consensus: false
      requires_blocker_clear: false
      description: "P12 → COMPLETE: Final transition"

  # Valid backward/revision transitions
  valid_backward:
    - source: p4
      target: p3
      expected_success: true
      requires_consensus: false
      requires_blocker_clear: false
      description: "P4 → P3: Review forces revision (any REVISE vote)"

    - source: p10
      target: p9
      expected_success: true
      requires_consensus: false
      requires_blocker_clear: false
      description: "P10 → P9: Code review forces revision (any REVISE vote)"

  # Invalid skip transitions (should fail)
  invalid_skips:
    - source: p1
      target: p3
      expected_success: false
      description: "P1 → P3: Skip P2 (invalid)"

    - source: p1
      target: p8
      expected_success: false
      description: "P1 → P8: Major skip (invalid)"

    - source: p4
      target: p6
      expected_success: false
      description: "P4 → P6: Skip P5 (invalid)"

    - source: p2
      target: p1
      expected_success: false
      description: "P2 → P1: Backward without revision semantics (invalid)"


# ─── Constraint Violations ────────────────────────────────────────────────────
# All 26 C-* constraints from CONSTRAINT_SPECS in aura_protocol.types.
# 25 runnable: 4 state-based + 1 transition-based + 2 audit + 14 structural + 4 naming.
# 1 skipped: C-actionable-errors (code review convention, no check method).
#
# State-based runnable case fields (violation_state):
#   current_phase: PhaseId string (p1–p12, complete)
#   review_votes: dict (axis letters A/B/C → ACCEPT or REVISE), default {}
#   blocker_count: int, default 0
#   severity_groups_present: bool — if true, populate all 3 SeverityLevel groups, default false
#   transition_history: list of {from_phase, to_phase, triggered_by, condition_met}
#
# Transition-based runnable case fields (violation_transition):
#   from_phase: PhaseId string for source phase
#   to_phase: PhaseId string for target phase
#
# Method-based runnable case fields (violation_method + violation_args):
#   violation_method: name of RuntimeConstraintChecker method to call
#   violation_args: dict of keyword arguments to pass to the method
#
# State-based tests call check_state(violation_state); transition-based tests call
# check_handoff_required(from_phase, to_phase); method-based tests call
# getattr(checker, violation_method)(**violation_args). All assert expected
# constraint_id appears in the returned violations list.

constraint_violations:

  # ─── Runnable (5) ─────────────────────────────────────────────────────────

  C-review-consensus:
    description: >
      State at P4 with no review votes — all 3 axes (CORRECTNESS, TEST_QUALITY, ELEGANCE) missing.
      check_state() fires C-review-consensus violation.
    violation_state:
      current_phase: p4
      review_votes: {}
      blocker_count: 0

  C-severity-not-plan:
    description: >
      State at P4 with severity_groups already populated — severity trees must not
      be used in plan review. check_state() via check_severity_tree() fires
      C-severity-not-plan for any state at p4 (severity_groups_present isolates intent).
    violation_state:
      current_phase: p4
      review_votes: {}
      blocker_count: 0
      severity_groups_present: true  # semantic: groups exist at p4, which is forbidden

  C-severity-eager:
    description: >
      State at P10 with empty severity_groups — all 3 groups must be created on entry.
      check_state() fires C-severity-eager when severity_groups is empty at p10.
    violation_state:
      current_phase: p10
      review_votes: {}
      blocker_count: 0
      # severity_groups_present omitted (defaults false) → empty severity_groups

  C-worker-gates:
    description: >
      State at P10 with 1 unresolved blocker — p10→p11 advance is blocked.
      check_state() fires C-worker-gates when blocker_count > 0 at p10.
    violation_state:
      current_phase: p10
      review_votes: {}
      blocker_count: 1
      severity_groups_present: true  # avoid C-severity-eager co-firing

  C-handoff-skill-invocation:
    description: >
      Transition P7→P8 (handoff to supervisor) is an actor-change transition that
      requires a handoff document. check_handoff_required(p7, p8) fires the violation.
    violation_transition:
      from_phase: p7
      to_phase: p8

  # ─── Audit constraints (2): violation_state with transition_history ──────────

  C-audit-never-delete:
    description: >
      State at P2 with empty transition_history — audit trail must not be cleared.
    violation_state:
      current_phase: p2

  C-audit-dep-chain:
    description: >
      State at P2 with transition record missing triggered_by.
    violation_state:
      current_phase: p2
      transition_history:
        - from_phase: p1
          to_phase: p2
          triggered_by: ""
          condition_met: "classification confirmed"

  # ─── Structural constraints (14): violation_method + violation_args ───────────

  C-review-binary:
    description: >
      Review vote with invalid value MAYBE — not ACCEPT or REVISE.
    violation_method: check_review_binary
    violation_args: { vote: "MAYBE" }

  C-dep-direction:
    description: >
      Dependency with empty parent_id — direction cannot be established.
    violation_method: check_dep_direction
    violation_args: { parent_id: "", child_id: "child-abc" }

  C-blocker-dual-parent:
    description: >
      BLOCKER finding with empty severity_group_id — missing one required parent.
    violation_method: check_blocker_dual_parent
    violation_args: { blocker_task_id: "leaf-1", severity_group_id: "", slice_id: "slice-1" }

  C-followup-timing:
    description: >
      IMPORTANT/MINOR findings exist but follow-up epic not yet created.
    violation_method: check_followup_timing
    violation_args: { has_important_or_minor: true, followup_created: false }

  C-vertical-slices:
    description: >
      Production code path has two owners — violates single-owner rule.
    violation_method: check_vertical_slices
    violation_args: { production_code_path: "src/module.py", owner_ids: ["worker-1", "worker-2"] }

  C-supervisor-no-impl:
    description: >
      Supervisor performing a file_edit action — direct implementation is forbidden.
    violation_method: check_supervisor_no_impl
    violation_args: { role: "supervisor", action_type: "file_edit" }

  C-supervisor-cartographers:
    description: >
      Supervisor at p8 without an explore team — cartographers required.
    violation_method: check_supervisor_cartographers
    violation_args: { phase: "p8", has_explore_team: false }

  C-integration-points:
    description: >
      IMPL_PLAN missing integration points — cross-slice contracts not documented.
    violation_method: check_integration_points
    violation_args: { has_integration_points: false }

  C-slice-review-before-close:
    description: >
      Worker attempting to close their own slice before review is complete.
    violation_method: check_slice_review_before_close
    violation_args: { slice_closed_by_worker: true, review_completed: false }

  C-max-review-cycles:
    description: >
      Review cycle count of 4 exceeds the cap of 3.
    violation_method: check_max_review_cycles
    violation_args: { review_cycle_count: 4 }

  C-slice-leaf-tasks:
    description: >
      Slice with no leaf tasks — L1/L2/L3 decomposition required.
    violation_method: check_slice_has_leaf_tasks
    violation_args: { slice_id: "slice-1", leaf_task_ids: [] }

  C-ure-verbatim:
    description: >
      URE interview with empty options list — verbatim capture not possible.
    violation_method: check_ure_verbatim
    violation_args: { question: "Q?", options: [], response: "A" }

  C-frontmatter-refs:
    description: >
      Task description without frontmatter — required urd reference is missing.
    violation_method: check_frontmatter_refs
    violation_args: { task_description: "No frontmatter here", required_ref_keys: ["urd"] }

  C-followup-leaf-adoption:
    description: >
      Leaf task with empty severity_group_id — missing required dual-parent.
    violation_method: check_followup_leaf_adoption
    violation_args: { leaf_task_id: "leaf-1", severity_group_id: "", followup_slice_id: "fs-1" }

  # ─── Naming constraints (4): violation_method + violation_args ────────────────

  C-agent-commit:
    description: >
      Commit command using git commit instead of git agent-commit.
    violation_method: check_agent_commit
    violation_args: { commit_command: "git commit -m 'feat: something'" }

  C-proposal-naming:
    description: >
      Proposal title with SLICE prefix instead of PROPOSAL prefix.
    violation_method: check_proposal_naming
    violation_args: { title: "SLICE-1: Bad proposal title" }

  C-review-naming:
    description: >
      Review title with PROPOSAL prefix — wrong type for a review task.
    violation_method: check_review_naming
    violation_args: { title: "PROPOSAL-1: Wrong type for review" }

  C-followup-lifecycle:
    description: >
      Follow-up task title missing FOLLOWUP prefix — URE prefix only.
    violation_method: check_followup_lifecycle
    violation_args: { followup_task_title: "URE: Missing FOLLOWUP prefix" }

  # ─── Stays skipped (1): no check method, code review convention only ──────────

  C-actionable-errors:
    description: >
